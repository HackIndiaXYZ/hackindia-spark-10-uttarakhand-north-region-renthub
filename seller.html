<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentHub - Seller Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <header>
        <div class="logo">🏠 RentHub (Seller Mode)</div>
        <nav>
            <a href="index.html">View Home Page</a> | 
            <a href="auth.html" id="logout-btn">Logout</a>
        </nav>
    </header>

    <div class="section-title">📤 List a New Item for Rent</div>
    
    <div class="filter-section">
        <form id="dashboard-form" style="display: flex; flex-direction: column; gap: 15px;">
            
            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label>Product Name:</label>
                <input type="text" id="p-name" placeholder="e.g. Sony DSLR Camera" required style="padding: 10px; background-color: #1e1e1e; border: 1px solid #444; color: #fff; border-radius: 4px;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label>Price per Day (₹):</label>
                <input type="number" id="p-price" placeholder="e.g. 600" required style="padding: 10px; background-color: #1e1e1e; border: 1px solid #444; color: #fff; border-radius: 4px;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label>Location (City):</label>
                <select id="p-location" required style="padding: 10px; background-color: #1e1e1e; border: 1px solid #444; color: #fff; border-radius: 4px;">
                    <option value="delhi">Delhi</option>
                    <option value="mumbai">Mumbai</option>
                    <option value="bangalore">Bangalore</option>
                </select>
            </div>

            <div style="display: flex; flex-direction: column; gap: 5px;">
                <label>Photo URL:</label>
                <input type="text" id="p-image" placeholder="Paste image address/link here" style="padding: 10px; background-color: #1e1e1e; border: 1px solid #444; color: #fff; border-radius: 4px;">
            </div>

            <button type="submit" class="rent-btn" style="padding: 12px; font-size: 16px; margin-top: 10px;">Create Item Box</button>
        </form>
    </div>

    <div class="section-title" style="margin-top: 40px;">📦 Your Listed Items (Live View)</div>
    <div id="seller-products-grid" class="products-grid"></div>

</div>

<script>
    const dashboardForm = document.getElementById('dashboard-form');
    const sellerGrid = document.getElementById('seller-products-grid');

    function loadSellerItems() {
        sellerGrid.innerHTML = '';
        const products = JSON.parse(localStorage.getItem('products')) || [];
        
        products.forEach(product => {
            let stars = '★'.repeat(product.rating) + '☆'.repeat(5 - product.rating);
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <img src="${product.image}" class="product-img" alt="${product.name}">
                <div class="product-info">${product.name}</div>
                <div class="product-price">₹${product.price} / Day</div>
                <div class="product-rating">${stars}</div>
                <div style="color: #aaa; font-size: 13px; margin-top: 5px;">📍 ${product.location.toUpperCase()}</div>
            `;
            sellerGrid.appendChild(card);
        });
    }

    dashboardForm.addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('p-name').value;
        const price = parseFloat(document.getElementById('p-price').value);
        const location = document.getElementById('p-location').value;
        let image = document.getElementById('p-image').value;

        if (!image) {
            image = "https://images.unsplash.com/photo-1530587191325-3db32d826c18?w=400";
        }

        const newProduct = {
            id: Date.now(),
            name: name,
            price: price,
            location: location,
            rating: 5,
            image: image
        };

        const currentProducts = JSON.parse(localStorage.getItem('products')) || [];
        currentProducts.push(newProduct);
        localStorage.setItem('products', JSON.stringify(currentProducts));

        loadSellerItems();
        dashboardForm.reset();
    });

    document.addEventListener('DOMContentLoaded', loadSellerItems);
</script>
</body>
</html>
